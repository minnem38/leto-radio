services:

  stream:
    build: .
    container_name: leto-stream
    restart: unless-stopped
    command: python stream_server.py
    ports:
      - "8765:8765"
    volumes:
      - music:/data/music
      - queue:/data/queue
    environment:
      - MUSIC_DIR=/data/music
      - QUEUE_FILE=/data/queue/queue.json
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - RADIO_CHANNEL_NAME=${RADIO_CHANNEL_NAME:-leto-radio}
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-20}

  bot:
    build: .
    container_name: leto-bot
    restart: unless-stopped
    command: python discord_bot.py
    volumes:
      - music:/data/music
      - queue:/data/queue
    environment:
      - MUSIC_DIR=/data/music
      - QUEUE_FILE=/data/queue/queue.json
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - RADIO_CHANNEL_NAME=${RADIO_CHANNEL_NAME:-leto-radio}
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-20}
    depends_on:
      - stream

volumes:
  music:
  queue:
