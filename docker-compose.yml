services:

  # ── Discord bot ──────────────────────────────────────────────────────────────
  bot:
    build: ./bot
    container_name: radio-bot
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID}
      PUBLIC_URL: ${PUBLIC_URL}
      FILE_TTL_SECONDS: ${FILE_TTL_SECONDS:-3600}
      AUDIO_DIR: /audio
    volumes:
      - audio_files:/audio
    depends_on:
      - fileserver
    networks:
      - radio

  # ── Static file server (nginx) ───────────────────────────────────────────────
  fileserver:
    image: nginx:1.27-alpine
    container_name: radio-fileserver
    restart: unless-stopped
    volumes:
      - audio_files:/audio:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FILESERVER_PORT:-8765}:80"
    networks:
      - radio

volumes:
  audio_files:

networks:
  radio:
    driver: bridge
