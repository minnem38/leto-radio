server {
    listen 80;
    server_name _;

    # Serve audio files from the shared volume
    location /audio/ {
        alias /audio/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin "*";

        # Allow range requests so Minecraft mods can seek/stream
        types {
            audio/mpeg  mp3;
            audio/ogg   ogg;
            audio/flac  flac;
            audio/wav   wav;
        }

        # Return 404 for directory listing
        autoindex off;
    }

    # Health check endpoint
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Block everything else
    location / {
        return 404;
    }
}
