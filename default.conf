server {
    listen 80;
    server_name _;

    location /audio/ {
        alias /audio/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin "*";
        types {
            audio/mpeg  mp3;
            audio/ogg   ogg;
            audio/flac  flac;
            audio/wav   wav;
        }
        autoindex off;
    }

    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 404;
    }
}
