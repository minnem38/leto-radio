<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leto Radio 📻</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono&display=swap');

    :root {
      --bg: #0e0e12;
      --surface: #16161e;
      --border: #2a2a3a;
      --accent: #7c6af7;
      --accent2: #e86af7;
      --green: #4af7a0;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .header p {
      color: var(--muted);
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 600px;
      margin-bottom: 1.2rem;
    }

    .now-playing-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--green);
      margin-bottom: 0.8rem;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .song-title {
      font-size: 1.35rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.4rem;
    }

    .song-meta {
      color: var(--muted);
      font-size: 0.875rem;
    }

    .song-meta span {
      color: var(--accent);
    }

    .nothing-playing {
      color: var(--muted);
      font-size: 1rem;
      text-align: center;
      padding: 0.5rem 0;
    }

    .queue-header {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .queue-item:last-child {
      border-bottom: none;
    }

    .queue-num {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 1.5rem;
      text-align: right;
    }

    .queue-info {
      flex: 1;
      min-width: 0;
    }

    .queue-title {
      font-weight: 500;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .queue-by {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .queue-by span {
      color: var(--accent);
    }

    .empty-queue {
      color: var(--muted);
      text-align: center;
      padding: 1rem 0;
      font-size: 0.9rem;
    }

    .stream-url {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      width: 100%;
      max-width: 600px;
      margin-bottom: 1.2rem;
    }

    .stream-url-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .stream-url-value {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--text);
      word-break: break-all;
    }

    .refresh-note {
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
      margin-top: 1rem;
    }

    .error {
      color: #f76a6a;
      text-align: center;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>📻 Leto Radio</h1>
    <p>Community jukebox for the Kryeit server</p>
  </div>

  <div class="stream-url">
    <div class="stream-url-label">🎮 Etched Disc URL</div>
    <div class="stream-url-value" id="stream-url">Loading...</div>
  </div>

  <div class="card">
    <div class="now-playing-label">
      <div class="pulse" id="pulse"></div>
      Now Playing
    </div>
    <div id="now-playing-content">
      <div class="nothing-playing">Loading...</div>
    </div>
  </div>

  <div class="card">
    <div class="queue-header">Up Next</div>
    <div id="queue-content">
      <div class="empty-queue">Loading queue...</div>
    </div>
  </div>

  <div class="refresh-note">Updates every 10 seconds</div>

  <script>
    const BASE_URL = window.location.origin;

    document.getElementById("stream-url").textContent = `${BASE_URL}/stream`;

    async function fetchNowPlaying() {
      try {
        const res = await fetch(`${BASE_URL}/nowplaying`);
        const data = await res.json();
        const el = document.getElementById("now-playing-content");
        const pulse = document.getElementById("pulse");

        if (!data.playing) {
          el.innerHTML = `<div class="nothing-playing">🔇 Nothing playing right now — drop a link in #leto-radio!</div>`;
          pulse.style.background = "var(--muted)";
          pulse.style.animation = "none";
        } else {
          pulse.style.background = "var(--green)";
          pulse.style.animation = "";
          el.innerHTML = `
            <div class="song-title">${escHtml(data.title)}</div>
            <div class="song-meta">Requested by <span>${escHtml(data.requested_by)}</span></div>
          `;
        }
      } catch (e) {
        document.getElementById("now-playing-content").innerHTML =
          `<div class="error">Couldn't reach the server.</div>`;
      }
    }

    async function fetchQueue() {
      try {
        const res = await fetch(`${BASE_URL}/queue`);
        const data = await res.json();
        const el = document.getElementById("queue-content");

        // Skip index 0 — that's now playing
        const upcoming = data.slice(1);

        if (upcoming.length === 0) {
          el.innerHTML = `<div class="empty-queue">Queue is empty — be the first to add something!</div>`;
          return;
        }

        el.innerHTML = upcoming.map((song, i) => `
          <div class="queue-item">
            <div class="queue-num">${i + 1}</div>
            <div class="queue-info">
              <div class="queue-title">${escHtml(song.title)}</div>
              <div class="queue-by">by <span>${escHtml(song.requested_by)}</span></div>
            </div>
          </div>
        `).join("");
      } catch (e) {
        document.getElementById("queue-content").innerHTML =
          `<div class="error">Couldn't load queue.</div>`;
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // Initial load
    fetchNowPlaying();
    fetchQueue();

    // Refresh every 10 seconds
    setInterval(() => {
      fetchNowPlaying();
      fetchQueue();
    }, 10000);
  </script>
</body>
</html>
