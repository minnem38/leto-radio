# ============================================================
# docker-compose.portainer.yml
# Paste this into Portainer's Web editor.
# Set the 3 required env vars in Portainer's env section.
# No build needed — pulls pre-built image from GHCR.
# ============================================================

services:

  bot:
    image: ghcr.io/minnem38/leto-radio:latest
    container_name: leto-radio-bot
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID}
      PUBLIC_URL: ${PUBLIC_URL}
      FILE_TTL_SECONDS: ${FILE_TTL_SECONDS:-3600}
      AUDIO_DIR: /audio
    volumes:
      - audio_files:/audio
    depends_on:
      - fileserver
    networks:
      - radio

  fileserver:
    image: nginx:1.27-alpine
    container_name: leto-radio-fileserver
    restart: unless-stopped
    ports:
      - "${FILESERVER_PORT:-8765}:80"
    volumes:
      - audio_files:/audio:ro
    command:
      - sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf << 'EOF'
        server {
          listen 80;
          server_name _;
          location /audio/ {
            alias /audio/;
            add_header Accept-Ranges bytes;
            add_header Cache-Control no-store;
            add_header Access-Control-Allow-Origin *;
            autoindex off;
          }
          location /health { return 200 "ok"; }
          location / { return 404; }
        }
        EOF
        nginx -g 'daemon off;'
    networks:
      - radio

volumes:
  audio_files:

networks:
  radio:
    driver: bridge
